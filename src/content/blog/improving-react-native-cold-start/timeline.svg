<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" width="100%" height="100%">
  <rect width="900" height="580" fill="#000000" rx="8"/>

  <style>
    .title { font-family: 'Geist', system-ui, -apple-system, sans-serif; font-weight: 700; font-size: 20px; fill: #FFFFFF; }
    .section-title { font-family: 'Geist', system-ui, -apple-system, sans-serif; font-weight: 600; font-size: 16px; fill: #A0A0A0; }
    .label { font-family: 'Geist', system-ui, -apple-system, sans-serif; font-weight: 500; font-size: 13px; fill: #E0E0E0; }
    .time-text { font-family: 'Geist', system-ui, -apple-system, sans-serif; font-weight: 400; font-size: 11px; fill: #707070; }
    .bar-text { font-family: 'Geist', system-ui, -apple-system, sans-serif; font-weight: 600; font-size: 12px; fill: #FFFFFF; }
    .bar-text-dark { font-family: 'Geist', system-ui, -apple-system, sans-serif; font-weight: 600; font-size: 12px; fill: #000000; }
    .annotation { font-family: 'Geist', system-ui, -apple-system, sans-serif; font-weight: 400; font-size: 12px; fill: #FF8787; }
    .annotation-good { font-family: 'Geist', system-ui, -apple-system, sans-serif; font-weight: 400; font-size: 12px; fill: #63E6BE; }
  </style>

  <text x="30" x="40" class="title">React Native Cold Start: Thread Timelines</text>
  <line x1="30" y1="55" x2="870" y2="55" stroke="#202020" stroke-width="1"/>

  <g transform="translate(0, 20)">
    <text x="30" y="75" class="section-title">BEFORE: Static Imports (Total 7s+ Bootstrap Choke)</text>
    
    <g transform="translate(180, 95)">
      <text x="0" y="0" class="time-text">0.0s</text>
      <text x="100" y="0" class="time-text">1.0s</text>
      <text x="450" y="0" class="time-text">4.5s</text>
      <text x="650" y="0" class="time-text">7.0s</text>
      <line x1="0" y1="5" x2="650" y2="5" stroke="#202020" stroke-width="1" stroke-dasharray="4"/>
    </g>

    <text x="30" y="133" class="label">UI Thread</text>
    <rect x="180" y="115" width="100" height="30" fill="#2B303A" rx="4"/>
    <text x="200" y="134" class="bar-text">Native Boot</text>
    <rect x="280" y="115" width="350" height="30" fill="#C92A2A" rx="4"/>
    <text x="380" y="134" class="bar-text">SPLASH SCREEN FROZEN</text>
    <rect x="630" y="115" width="200" height="30" fill="#495057" rx="4"/>
    <text x="690" y="134" class="bar-text">Draw Views</text>

    <text x="30" y="178" class="label">JS Thread (mqt_v_js)</text>
    <rect x="180" y="160" width="100" height="30" fill="#2B303A" rx="4"/>
    <rect x="280" y="160" width="350" height="30" fill="#E03131" rx="4"/>
    <text x="310" y="179" class="bar-text">Synchronous Evaluation Loop (Web3/Crypto Blocks)</text>
    <rect x="630" y="160" width="200" height="30" fill="#212529" rx="4"/>
    <text x="710" y="179" class="bar-text" fill="#495057">Idle</text>

    <path d="M 455,195 L 455,215" stroke="#FF8787" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
    <text x="290" y="230" class="annotation">❌ UI thread idles doing zero work while single JS thread is pinned parsing packages.</text>
  </g>

  <line x1="30" y1="285" x2="870" y2="285" stroke="#202020" stroke-width="1"/>

  <g transform="translate(0, 270)">
    <text x="30" y="55" class="section-title">AFTER: Global Inline Requires (Total ~2s Fast Launch)</text>
    
    <g transform="translate(180, 75)">
      <text x="0" y="0" class="time-text">0.0s</text>
      <text x="100" y="0" class="time-text">1.0s</text>
      <text x="180" y="0" class="time-text">1.8s</text>
      <text x="650" y="0" class="time-text">7.0s</text>
      <line x1="0" y1="5" x2="650" y2="5" stroke="#202020" stroke-width="1" stroke-dasharray="4"/>
    </g>

    <text x="30" y="113" class="label">UI Thread</text>
    <rect x="180" y="95" width="100" height="30" fill="#2B303A" rx="4"/>
    <text x="200" y="114" class="bar-text">Native Boot</text>
    <rect x="280" y="95" width="80" height="30" fill="#0CA678" rx="4"/>
    <text x="295" y="114" class="bar-text-dark">Measure</text>
    <rect x="360" y="95" width="470" height="30" fill="#0F2D24" stroke="#0CA678" stroke-width="1" rx="4"/>
    <text x="490" y="114" class="bar-text" fill="#63E6BE">🚀 Dashboard Interactive &amp; Fluid (120Hz)</text>

    <text x="30" y="158" class="label">JS Thread (mqt_v_js)</text>
    <rect x="180" y="140" width="100" height="30" fill="#2B303A" rx="4"/>
    <rect x="280" y="140" width="80" height="30" fill="#12B886" rx="4"/>
    <text x="298" y="159" class="bar-text-dark">Fast Pass</text>
    
    <g fill="#212529" stroke="#343A40" stroke-width="1">
      <rect x="360" y="140" width="80" height="30" rx="2"/>
      <rect x="470" y="140" width="60" height="30" rx="2"/>
      <rect x="580" y="140" width="90" height="30" rx="2"/>
    </g>
    <rect x="440" y="140" width="30" height="30" fill="#0CA678" rx="2"/>
    <text x="445" y="159" class="bar-text-dark" font-size="10">WC</text>
    
    <rect x="530" y="140" width="50" height="30" fill="#0CA678" rx="2"/>
    <text x="542" y="159" class="bar-text-dark" font-size="10">Crypto</text>

    <path d="M 361,80 L 361,90" stroke="#63E6BE" stroke-width="1" fill="none"/>
    <text x="375" y="210" class="annotation-good">✨ PARALLEL EFFICIENCY: Minimal entry code evaluation unblocks the bridge immediately.</text>
    <text x="375" y="228" class="annotation-good">Heavy frameworks are lazily loaded later on-demand without hitching frames.</text>
  </g>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#FF8787"/>
    </marker>
  </defs>
</svg>
